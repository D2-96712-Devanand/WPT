<!DOCTYPE html>
<html>
<head>
    <title>Table Layout</title>
    <style>
        table {
            width: 800px;
            border-collapse: collapse;
            text-align: center;
        }
        td {
            border: 4px double black;
            height: 60px;
            font-size: 20px;
        }
    </style>
</head>
<body>

<table>

    <tr>
        <td colspan="5">A</td>
    </tr>

    <tr>
        <td colspan="3" rowspan="2">B</td>
        <td colspan="2">C</td>
    </tr>

    <tr>
        <td>D</td>
        <td>E</td>
    </tr>

    <tr>
        <td rowspan="2">F</td>
        <td colspan="4">G</td>
    </tr>

    <tr>
        <td>H</td>
        <td>I</td>
        <td colspan="2">J</td>
    </tr>

    <tr>
        <td colspan="3" rowspan="2">L</td>
        <td colspan="2">K</td>
    </tr>
    
    <tr>
        <td>M</td>
        <td>N</td>
    </tr>
</table>

</body>
</html>
